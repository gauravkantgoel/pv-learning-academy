<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c67b1a"/>
      <stop offset="100%" style="stop-color:#e8a849"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <!-- Brand -->
  <rect x="60" y="50" width="52" height="52" rx="12" fill="url(#accent)"/>
  <text x="86" y="84" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">PV</text>
  <text x="128" y="83" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="start">PV Learning Academy</text>
  <!-- Title -->
  <text x="60" y="200" font-family="Georgia,serif" font-size="52" font-weight="600" fill="white">Signal Management</text>
  <text x="60" y="264" font-family="Georgia,serif" font-size="52" font-weight="600" fill="white">Learning Module</text>
  <!-- Subtitle -->
  <text x="60" y="320" font-family="system-ui,sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">Interactive pharmacovigilance training — free, no login required</text>
  <!-- Feature pills -->
  <rect x="60" y="380" width="180" height="38" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="150" y="404" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">5 Progressive Stages</text>
  <rect x="256" y="380" width="200" height="38" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="356" y="404" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Scenario Checkpoints</text>
  <rect x="472" y="380" width="170" height="38" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="557" y="404" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">SDR Triage Exercise</text>
  <rect x="658" y="380" width="160" height="38" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="738" y="404" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">GVP IX Mapped</text>
  <!-- Stage flow -->
  <text x="60" y="480" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.35)" letter-spacing="2" text-transform="uppercase">LEARNING PATH</text>
  <text x="60" y="520" font-family="system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">Fundamentals → Detection → Evaluation → Action → Integrated Scenarios</text>
  <!-- Bottom bar -->
  <rect x="60" y="575" width="1080" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="60" y="600" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">Open source • Zero dependencies • Works offline</text>
</svg>
