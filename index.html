  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f1ed;
      --panel: #ffffff;
      --panel-soft: #faf9f7;
      --panel-muted: #f5f4f1;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --line: #ddd8d0;
      --accent: #1e3a5f;
      --accent-soft: #e8eef5;
      --accent-strong: #142d4a;
      --accent-glow: #2b5a8f;
      --good: #2a7d4f;
      --good-soft: #edf7f1;
      --warn: #b8860b;
      --warn-soft: #fdf6e7;
      --rose: #a63d56;
      --rose-soft: #fceef2;
      --amber: #c67b1a;
      --amber-soft: #fef5e8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Newsreader', Georgia, 'Times New Roman', serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP NAV ── */
    .topnav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26, 26, 26, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #fff;
    }
    .topnav-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .topnav-brand {
      display: flex; align-items: center; gap: 12px;
      font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
    }
    .topnav-brand .brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #c67b1a 0%, #e8a849 100%);
      display: grid; place-items: center;
      font-size: 16px; font-weight: 800; color: #fff;
      font-family: var(--font-display);
    }
    .topnav-brand span { opacity: 0.45; font-weight: 400; margin: 0 2px; }
    .topnav-actions { display: flex; gap: 8px; align-items: center; }
    .topnav-pill {
      font: inherit; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: 0.15s;
    }
    .topnav-pill:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .topnav-pill.active {
      background: var(--amber); color: #fff;
      border-color: var(--amber);
    }

    /* ── MODULE NAV ── */
    .module-nav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 56px; z-index: 90;
    }
    .module-nav-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; gap: 6px;
      height: 48px; overflow-x: auto;
    }
    .module-tab {
      font: inherit; font-size: 13px; font-weight: 600;
      padding: 6px 14px; border-radius: 8px;
      background: none; color: var(--muted);
      border: 1px solid transparent;
      cursor: pointer; transition: 0.15s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .module-tab:hover { background: var(--panel-muted); color: var(--text); }
    .module-tab.active {
      background: var(--accent-soft); color: var(--accent);
      border-color: rgba(30,58,95,0.15);
    }
    .module-tab.disabled {
      opacity: 0.4; cursor: not-allowed;
    }
    .module-tab .tab-dot {
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--line);
    }
    .module-tab.active .tab-dot { background: var(--accent); }
    .module-tab.complete .tab-dot { background: var(--good); }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      padding: 24px 0 48px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky; top: 128px;
    }
    .sidebar-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--line);
    }
    .sidebar-header h3 {
      font-family: var(--font-display);
      font-size: 17px; font-weight: 600;
      letter-spacing: -0.01em;
    }
    .sidebar-header p {
      font-size: 12px; color: var(--muted);
      margin-top: 4px;
    }
    .stage-list { padding: 8px; }
    .stage-item {
      font: inherit; width: 100%; text-align: left;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: none; border: none; cursor: pointer;
      transition: 0.12s; color: var(--text);
    }
    .stage-item:hover { background: var(--panel-muted); }
    .stage-item.active { background: var(--accent-soft); }
    .stage-item.locked { opacity: 0.4; cursor: not-allowed; }
    .stage-item .stage-num {
      width: 28px; height: 28px; border-radius: 8px;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 800;
      background: var(--panel-muted); color: var(--muted);
      flex-shrink: 0;
    }
    .stage-item.active .stage-num { background: var(--accent); color: #fff; }
    .stage-item.complete .stage-num { background: var(--good); color: #fff; }
    .stage-item .stage-info { min-width: 0; }
    .stage-item .stage-name { font-size: 13px; font-weight: 600; display: block; }
    .stage-item .stage-hint {
      font-size: 11px; color: var(--muted); display: block;
      margin-top: 1px;
    }
    .stage-item .stage-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .stage-badge.done { background: var(--good-soft); color: var(--good); }
    .stage-badge.current { background: var(--accent-soft); color: var(--accent); }
    .stage-badge.locked-badge { background: var(--panel-muted); color: var(--muted); }

    .sidebar-progress {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
    }
    .progress-track {
      width: 100%; height: 6px; border-radius: 999px;
      background: var(--panel-muted);
      overflow: hidden; margin-top: 8px;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-glow) 100%);
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 11px; color: var(--muted); font-weight: 600;
    }

    .sidebar-footer {
      padding: 12px 18px 16px;
      border-top: 1px solid var(--line);
    }
    .reset-btn {
      font: inherit; font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 8px;
      background: none; border: 1px solid var(--line);
      color: var(--muted); cursor: pointer; transition: 0.15s;
      width: 100%;
    }
    .reset-btn:hover { background: var(--rose-soft); color: var(--rose); border-color: #e8c0cb; }

    /* ── CONTENT AREA ── */
    .content-area { min-width: 0; }

    .hero-banner {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .hero-inner {
      padding: 32px 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px; align-items: center;
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--amber);
      margin-bottom: 8px;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(26px, 3.5vw, 38px);
      font-weight: 500; letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .hero-desc {
      color: var(--muted); font-size: 15px;
      margin-top: 10px; max-width: 640px;
    }
    .hero-stats {
      display: flex; gap: 16px;
    }
    .hero-stat {
      text-align: center;
      padding: 14px 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-soft);
    }
    .hero-stat strong {
      display: block; font-size: 24px;
      font-family: var(--font-display);
      font-weight: 700; color: var(--accent);
    }
    .hero-stat span {
      font-size: 11px; color: var(--muted);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── STAGE CONTENT CARD ── */
    .stage-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .stage-card-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .stage-card-header .pill {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 6px;
    }
    .pill-accent { background: var(--accent-soft); color: var(--accent); }
    .pill-good { background: var(--good-soft); color: var(--good); }
    .pill-warn { background: var(--warn-soft); color: var(--warn); }
    .pill-amber { background: var(--amber-soft); color: var(--amber); }

    .stage-card-body { padding: 24px 28px 28px; }

    /* ── CONTENT BLOCKS ── */
    .intro-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 20px;
    }
    .info-block, .summary-block {
      border: 1px solid var(--line);
      border-radius: 12px; padding: 18px;
      background: var(--panel-soft);
    }
    .info-block h4, .summary-block h4 {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 600;
      margin-bottom: 10px;
    }
    .info-block p, .summary-block p { font-size: 14px; color: var(--muted); }
    .info-block ul, .summary-block ul {
      margin: 8px 0 0 16px; padding: 0;
    }
    .info-block li, .summary-block li {
      font-size: 14px; color: var(--muted); margin-bottom: 4px;
    }

    .concept-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin-bottom: 20px;
    }
    .concept-item {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: #fff;
    }
    .concept-item h4 {
      font-size: 14px; font-weight: 700; margin-bottom: 6px;
    }
    .concept-item p { font-size: 13px; color: var(--muted); }

    .analogy-tag {
      margin-top: 10px; padding: 10px 12px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fefcf8, #fdf8f0);
      border: 1px solid #e8dcc8;
      font-size: 12px; color: #7a6540;
    }
    .analogy-tag strong { color: #5a4a30; }

    .compare-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin: 20px 0;
    }
    .compare-item {
      border-radius: 12px; padding: 16px;
      border: 1px solid var(--line);
    }
    .compare-item.bad {
      background: #fffaf2; border-color: #edd8b3;
    }
    .compare-item.good {
      background: #f5fbf7; border-color: #c0deca;
    }
    .compare-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .compare-item p { font-size: 13px; color: var(--muted); }

    .scenario-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin: 20px 0;
    }
    .scenario-item {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: #fff;
    }
    .scenario-item .sc-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 8px;
      border-radius: 5px; background: var(--accent-soft); color: var(--accent);
      display: inline-block; margin-bottom: 8px;
    }
    .scenario-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .scenario-item p { font-size: 13px; color: var(--muted); }

    .method-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin: 20px 0;
    }
    .method-item {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: #fff;
    }
    .method-item .method-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 8px;
      border-radius: 5px; background: var(--accent-soft); color: var(--accent);
      display: inline-block; margin-bottom: 8px;
    }
    .method-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .method-item p { font-size: 13px; color: var(--muted); }

    .tool-row-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin: 20px 0;
    }
    .tool-item {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: #fff;
    }
    .tool-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .tool-item p { font-size: 13px; color: var(--muted); }

    .section-divider {
      margin: 24px 0 16px;
    }
    .section-divider h3 {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 600;
      letter-spacing: -0.01em;
    }
    .section-divider p {
      font-size: 13px; color: var(--muted); margin-top: 4px;
    }

    /* ── INTERACTIVE VISUALS ── */
    .visual-shell {
      margin: 20px 0;
      border: 1px solid var(--line); border-radius: 14px;
      background: linear-gradient(180deg, #fcfbf9, #f9f8f5);
      padding: 20px;
    }
    .visual-head { margin-bottom: 14px; }
    .visual-head .pill { margin-bottom: 8px; display: inline-block; }
    .visual-head h4 {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 600;
    }
    .visual-head p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .visual-body {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .interactive-card {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: var(--panel-soft);
    }
    .interactive-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .interactive-card p { font-size: 13px; color: var(--muted); }

    .chip-row, .tool-row-pills, .scenario-step-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .chip-btn, .scenario-step-btn, .tool-pill-btn {
      font: inherit; font-size: 12px; font-weight: 600;
      padding: 7px 12px; border-radius: 8px;
      background: #fff; color: var(--text);
      border: 1px solid var(--line);
      cursor: pointer; transition: 0.12s;
    }
    .chip-btn:hover, .scenario-step-btn:hover, .tool-pill-btn:hover {
      background: var(--accent-soft); border-color: rgba(30,58,95,0.2);
    }
    .chip-btn.active, .scenario-step-btn.active, .tool-pill-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    .ladder { display: grid; gap: 10px; }
    .ladder-step {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; background: #fff; cursor: pointer;
      transition: 0.12s;
    }
    .ladder-step:hover { border-color: rgba(30,58,95,0.2); }
    .ladder-step.active {
      background: var(--accent-soft); border-color: rgba(30,58,95,0.25);
    }
    .ladder-num {
      width: 26px; height: 26px; border-radius: 7px;
      display: inline-grid; place-items: center;
      font-size: 12px; font-weight: 800;
      background: var(--panel-muted); color: var(--muted);
      margin-bottom: 6px;
    }
    .ladder-step.active .ladder-num { background: var(--accent); color: #fff; }
    .ladder-step h4 { font-size: 13px; font-weight: 700; }
    .ladder-step p { font-size: 12px; color: var(--muted); }

    .result-box, .score-box, .formula-box {
      border: 1px solid var(--line); border-radius: 10px;
      background: #fff; padding: 14px;
    }
    .result-box p { font-size: 13px; color: var(--muted); }
    .result-box strong { color: var(--text); }

    .controls-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field {
      display: block; border: 1px solid var(--line);
      border-radius: 10px; padding: 10px; background: #fff;
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    .field input[type="range"] {
      width: 100%; margin-top: 8px;
      accent-color: var(--accent); cursor: pointer;
    }
    .field input[type="number"], .field select {
      width: 100%; margin-top: 6px; font: inherit;
      font-size: 13px; padding: 6px 8px; border-radius: 6px;
      border: 1px solid var(--line); background: #fff; color: var(--text);
    }

    .signal-bar {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 10px; align-items: center;
      font-size: 13px; margin-bottom: 6px;
    }
    .bar-track {
      width: 100%; height: 8px; border-radius: 999px;
      background: #eef0ec; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-glow), var(--accent));
    }

    .stat-line {
      display: flex; justify-content: space-between;
      gap: 10px; font-size: 13px; color: var(--muted);
      margin-top: 6px;
    }

    .meter-shell {
      border: 1px solid var(--line); border-radius: 12px;
      background: #fff; padding: 12px; margin-top: 10px;
    }
    .meter-track {
      width: 100%; height: 12px; border-radius: 999px;
      background: linear-gradient(90deg, #fde0c8, #fef3c8, #d4eeda);
      position: relative; overflow: hidden;
      border: 1px solid var(--line);
    }
    .meter-thumb {
      position: absolute; top: -3px;
      width: 18px; height: 18px; border-radius: 999px;
      background: var(--accent); border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(30,58,95,0.3);
      transform: translateX(-50%);
    }
    .meter-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-top: 6px;
    }

    .decision-map {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-top: 12px;
    }
    .decision-cell {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; background: #fff;
    }
    .decision-cell.active {
      background: var(--accent-soft); border-color: rgba(30,58,95,0.25);
    }
    .decision-cell h4 { font-size: 13px; font-weight: 700; }
    .decision-cell p { font-size: 12px; color: var(--muted); }

    .scenario-layout {
      display: grid; grid-template-columns: 0.9fr 1.1fr;
      gap: 16px; margin-top: 12px;
    }
    .scenario-detail {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; background: var(--panel-soft);
    }
    .scenario-detail h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .scenario-detail p { font-size: 13px; color: var(--muted); }

    .metric-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-top: 12px;
    }
    .metric-card {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 14px; background: #fff;
    }
    .metric-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .metric-card p, .metric-card li { font-size: 12px; color: var(--muted); }
    .metric-card ul { margin: 4px 0 0 14px; padding: 0; }

    .flow-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-top: 12px;
    }
    .flow-card {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; background: #fff;
    }
    .flow-card h4 { font-size: 13px; font-weight: 700; }
    .flow-card p { font-size: 12px; color: var(--muted); }

    .mini-table {
      display: grid; grid-template-columns: 1.2fr 1fr 1fr;
      border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden; background: #fff;
    }
    .mini-table div {
      padding: 10px; border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .mini-table div:nth-child(3n) { border-right: none; }
    .mini-table div:nth-last-child(-n+3) { border-bottom: none; }
    .mini-head {
      background: var(--panel-muted); font-weight: 700; color: var(--text);
    }

    /* ── MEMORY / STICKY LEARNING (compact) ── */
    .memory-shell {
      margin: 20px 0;
      border: 1px solid var(--line); border-radius: 14px;
      background: linear-gradient(180deg, #fefdfb, #f9f8f5);
      padding: 18px;
    }
    .memory-header {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .memory-header h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
    .memory-hook {
      font-size: 13px; font-weight: 700; color: var(--amber);
      padding: 8px 12px; border-radius: 8px;
      background: var(--amber-soft); border: 1px solid #e8d8b0;
      margin-bottom: 12px;
    }
    .memory-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .memory-card {
      border: 1px solid var(--line); border-radius: 12px;
      padding: 14px; background: #fff;
    }
    .memory-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .memory-card p { font-size: 13px; color: var(--muted); }

    .reveal-btn {
      margin-top: 10px; font: inherit; font-size: 12px;
      font-weight: 700; padding: 7px 14px; border-radius: 8px;
      background: var(--accent-soft); color: var(--accent);
      border: 1px solid rgba(30,58,95,0.15);
      cursor: pointer; transition: 0.12s;
    }
    .reveal-btn:hover { background: #d5dff0; }

    .icon-chip {
      padding: 10px; border: 1px solid var(--line);
      border-radius: 10px; background: #fff;
      min-width: 90px; flex: 1 1 90px;
    }
    .icon-chip span { display: block; font-size: 20px; margin-bottom: 4px; }
    .icon-chip strong { font-size: 12px; }
    .icon-chip p { font-size: 11px; color: var(--muted); margin: 4px 0 0; }
    .visual-chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    /* ── CHECKPOINT (SCENARIO-BASED) ── */
    .checkpoint-shell {
      margin-top: 24px;
      border: 2px solid var(--line); border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }
    .checkpoint-header {
      padding: 16px 20px;
      background: var(--panel-muted);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    .checkpoint-header .ck-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: grid; place-items: center;
      font-size: 14px; font-weight: 800;
    }
    .ck-icon.pending { background: var(--warn-soft); color: var(--warn); }
    .ck-icon.passed { background: var(--good-soft); color: var(--good); }
    .checkpoint-header h4 { font-size: 15px; font-weight: 700; }

    .checkpoint-body { padding: 20px; }
    .checkpoint-vignette {
      border: 1px solid #e0dbd0;
      border-radius: 10px; padding: 16px;
      background: linear-gradient(180deg, #fdfcf9, #faf8f3);
      margin-bottom: 16px;
    }
    .checkpoint-vignette .vig-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--amber);
      margin-bottom: 6px;
    }
    .checkpoint-vignette p {
      font-size: 14px; color: var(--text); line-height: 1.7;
    }
    .checkpoint-question {
      font-family: var(--font-display);
      font-size: 17px; font-weight: 600;
      margin-bottom: 14px;
    }
    .checkpoint-options { display: grid; gap: 8px; }
    .option-btn {
      font: inherit; font-size: 14px;
      padding: 12px 14px; border-radius: 10px;
      background: var(--panel-soft); color: var(--text);
      border: 1px solid var(--line);
      cursor: pointer; transition: 0.12s;
      text-align: left;
    }
    .option-btn:hover { background: var(--accent-soft); border-color: rgba(30,58,95,0.2); }
    .option-btn.selected-correct {
      background: var(--good-soft); border-color: #8ec8a3;
      cursor: default;
    }
    .option-btn.selected-wrong {
      background: var(--warn-soft); border-color: #ddc490;
      cursor: default;
    }

    .checkpoint-feedback {
      margin-top: 14px; padding: 14px;
      border-radius: 10px; display: none;
      font-size: 14px;
    }
    .checkpoint-feedback.good {
      display: block;
      background: var(--good-soft); border: 1px solid #b3d8c2;
      color: var(--good);
    }
    .checkpoint-feedback.warn {
      display: block;
      background: var(--warn-soft); border: 1px solid #ddc490;
      color: var(--warn);
    }
    .checkpoint-feedback strong { display: block; margin-bottom: 4px; }

    .checkpoint-explanation {
      margin-top: 14px; padding: 14px;
      border-radius: 10px;
      background: var(--panel-soft); border: 1px solid var(--line);
      display: none;
    }
    .checkpoint-explanation.show { display: block; }
    .checkpoint-explanation h5 {
      font-size: 13px; font-weight: 700; margin-bottom: 6px;
    }
    .checkpoint-explanation p {
      font-size: 13px; color: var(--muted);
    }

    .checkpoint-actions {
      margin-top: 16px;
      display: flex; justify-content: space-between;
      align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .next-stage-btn {
      font: inherit; font-size: 14px; font-weight: 700;
      padding: 10px 20px; border-radius: 10px;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer; transition: 0.12s;
    }
    .next-stage-btn:hover { background: var(--accent-strong); }

    .small-note { font-size: 12px; color: var(--muted); }

    /* ── REFERENCE CARD ── */
    .reference-card {
      margin-top: 20px; padding: 16px;
      border: 1px solid var(--line); border-radius: 12px;
      background: #fff;
    }
    .reference-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .reference-card li { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .reference-card ul { margin: 0 0 0 16px; padding: 0; }

    /* ── LOCKED PANEL ── */
    .locked-panel {
      margin-top: 16px; padding: 20px;
      border: 1px solid var(--line); border-radius: 12px;
      background: var(--panel-soft);
      display: none;
    }
    .locked-panel h4 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .locked-panel p { font-size: 14px; color: var(--muted); }
    .locked-panel ul { margin: 8px 0 0 16px; padding: 0; }
    .locked-panel li { font-size: 13px; color: var(--muted); }

    /* ── MODULE LANDING (future modules) ── */
    .module-landing {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px; text-align: center;
    }
    .module-landing .ml-icon {
      width: 64px; height: 64px; border-radius: 16px;
      display: inline-grid; place-items: center;
      font-size: 28px; background: var(--panel-muted);
      margin-bottom: 16px;
    }
    .module-landing h2 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 600;
    }
    .module-landing p {
      font-size: 14px; color: var(--muted);
      margin-top: 8px; max-width: 480px;
      display: inline-block;
    }
    .module-landing .coming-pill {
      display: inline-block; margin-top: 16px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 999px;
      background: var(--panel-muted); color: var(--muted);
    }

    /* ── SDR TRIAGE TABLE ── */
    .sdr-table-wrap {
      overflow-x: auto; margin-top: 14px;
      border: 1px solid var(--line); border-radius: 12px;
      background: #fff;
    }
    .sdr-table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; min-width: 780px;
    }
    .sdr-table th {
      background: var(--panel-muted); font-weight: 700;
      padding: 10px 12px; text-align: left;
      border-bottom: 2px solid var(--line);
      position: sticky; top: 0; z-index: 2;
      color: var(--text); font-size: 11px;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .sdr-table td {
      padding: 9px 12px; border-bottom: 1px solid var(--line);
      vertical-align: middle; color: var(--text);
    }
    .sdr-table tr:last-child td { border-bottom: none; }
    .sdr-table tr:hover td { background: #faf9f6; }
    .sdr-table tr.sdr-selected td { background: var(--accent-soft); }
    .sdr-table tr.sdr-correct td { background: var(--good-soft); }
    .sdr-table tr.sdr-missed td { background: var(--warn-soft); }

    .sdr-rank-cell {
      width: 48px; text-align: center;
    }
    .sdr-rank-btn {
      font: inherit; font-size: 11px; font-weight: 800;
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--panel-muted); color: var(--muted);
      border: 1px solid var(--line); cursor: pointer;
      display: inline-grid; place-items: center;
      transition: 0.12s;
    }
    .sdr-rank-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: rgba(30,58,95,0.2); }
    .sdr-rank-btn.ranked {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .sdr-rank-btn.rank-correct {
      background: var(--good); color: #fff; border-color: var(--good);
    }
    .sdr-rank-btn.rank-partial {
      background: var(--amber); color: #fff; border-color: var(--amber);
    }

    .sdr-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .sdr-tag.serious { background: #fde8e8; color: #b03030; }
    .sdr-tag.non-serious { background: #eef3e8; color: #4a7030; }
    .sdr-tag.labeled { background: var(--panel-muted); color: var(--muted); }
    .sdr-tag.unlabeled { background: #fef3e0; color: #8a6010; }
    .sdr-tag.dme { background: #fde8f0; color: #9a2060; }
    .sdr-tag.class-effect { background: #e8eef8; color: #30509a; }
    .sdr-tag.high-ror { background: #f8e8e8; color: #a03030; }

    .sdr-ror-bar {
      display: inline-block; height: 7px; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-glow), var(--accent));
      vertical-align: middle; margin-left: 6px;
    }

    .sdr-actions {
      margin-top: 14px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .sdr-submit-btn {
      font: inherit; font-size: 13px; font-weight: 700;
      padding: 9px 18px; border-radius: 10px;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer; transition: 0.12s;
    }
    .sdr-submit-btn:hover { background: var(--accent-strong); }
    .sdr-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .sdr-reset-btn {
      font: inherit; font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 8px;
      background: none; border: 1px solid var(--line);
      color: var(--muted); cursor: pointer; transition: 0.12s;
    }
    .sdr-reset-btn:hover { background: var(--panel-muted); }

    .sdr-feedback {
      margin-top: 14px; padding: 16px;
      border-radius: 12px; display: none;
      border: 1px solid var(--line);
    }
    .sdr-feedback.show { display: block; }
    .sdr-feedback.excellent {
      background: var(--good-soft); border-color: #b0d4be;
    }
    .sdr-feedback.partial {
      background: var(--amber-soft); border-color: #e0cc90;
    }
    .sdr-feedback.needs-work {
      background: var(--rose-soft); border-color: #e0b8c4;
    }
    .sdr-feedback h5 {
      font-size: 14px; font-weight: 700; margin-bottom: 8px;
    }
    .sdr-feedback p { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .sdr-feedback strong { color: var(--text); }

    .sdr-rationale-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-top: 12px;
    }
    .sdr-rationale-card {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; background: #fff;
    }
    .sdr-rationale-card h6 {
      font-size: 12px; font-weight: 700; margin-bottom: 4px;
    }
    .sdr-rationale-card p { font-size: 11px; color: var(--muted); margin: 0; }

    /* ── EVALUATION CHALLENGE ── */
    .eval-challenge {
      margin-top: 16px;
      border: 2px solid var(--line); border-radius: 14px;
      overflow: hidden; background: #fff;
    }
    .eval-challenge-header {
      padding: 14px 18px;
      background: linear-gradient(180deg, #fdfcf9, #f8f6f1);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    .eval-challenge-header .ec-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: grid; place-items: center; font-size: 14px;
      background: var(--amber-soft); color: var(--amber); font-weight: 800;
    }
    .eval-challenge-header h4 { font-size: 14px; font-weight: 700; }
    .eval-challenge-body { padding: 18px; }

    .eval-recommendation {
      border: 1px solid #ddd8cc; border-radius: 10px;
      padding: 14px; background: linear-gradient(180deg, #fefcf8, #faf8f2);
      margin-bottom: 14px;
    }
    .eval-recommendation .rec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 6px;
    }
    .eval-recommendation p { font-size: 13px; color: var(--text); line-height: 1.65; }

    .eval-verdict-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .eval-verdict-btn {
      font: inherit; font-size: 13px; font-weight: 700;
      padding: 10px 20px; border-radius: 10px;
      background: var(--panel-soft); color: var(--text);
      border: 1px solid var(--line);
      cursor: pointer; transition: 0.12s;
      flex: 1;
    }
    .eval-verdict-btn:hover { background: var(--accent-soft); border-color: rgba(30,58,95,0.2); }
    .eval-verdict-btn.selected-agree {
      background: var(--good-soft); border-color: #8ec8a3; color: var(--good);
    }
    .eval-verdict-btn.selected-disagree {
      background: var(--rose-soft); border-color: #d8a0b0; color: var(--rose);
    }

    .eval-reason-grid {
      display: grid; gap: 8px; margin-bottom: 14px;
    }
    .eval-reason-btn {
      font: inherit; font-size: 13px;
      padding: 10px 14px; border-radius: 10px;
      background: var(--panel-soft); color: var(--text);
      border: 1px solid var(--line);
      cursor: pointer; transition: 0.12s;
      text-align: left;
    }
    .eval-reason-btn:hover { background: var(--accent-soft); border-color: rgba(30,58,95,0.2); }
    .eval-reason-btn.chosen { background: var(--accent-soft); border-color: rgba(30,58,95,0.25); font-weight: 600; }
    .eval-reason-btn.reason-correct { background: var(--good-soft); border-color: #8ec8a3; }
    .eval-reason-btn.reason-wrong { background: var(--warn-soft); border-color: #ddc490; }

    .eval-challenge-feedback {
      padding: 14px; border-radius: 10px;
      display: none;
    }
    .eval-challenge-feedback.show { display: block; }
    .eval-challenge-feedback.good {
      background: var(--good-soft); border: 1px solid #b0d4be;
    }
    .eval-challenge-feedback.warn {
      background: var(--warn-soft); border: 1px solid #ddc490;
    }
    .eval-challenge-feedback h5 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .eval-challenge-feedback p { font-size: 13px; color: var(--muted); }
    .eval-challenge-feedback strong { color: var(--text); }

    /* ── REGULATORY CONTEXT ── */
    .reg-panel { margin: 20px 0; border: 1px solid #c8d0d8; border-radius: 14px; background: linear-gradient(180deg,#f4f7fb,#edf1f7); overflow: hidden; }
    .reg-panel-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .reg-panel-header .reg-icon { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); font-size: 13px; font-weight: 800; }
    .reg-panel-header h4 { font-size: 14px; font-weight: 700; color: var(--accent); flex: 1; }
    .reg-panel-header .reg-toggle { font-size: 12px; color: var(--muted); font-weight: 600; }
    .reg-panel-body { padding: 0 18px 16px; display: none; }
    .reg-panel-body.open { display: block; }
    .reg-ref { display: grid; grid-template-columns: 140px 1fr; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(200,208,216,0.5); font-size: 12px; }
    .reg-ref:last-child { border-bottom: none; }
    .reg-ref-key { font-weight: 700; color: var(--accent); }
    .reg-ref-val { color: var(--muted); }

    /* ── SIGNAL LIFECYCLE ── */
    .lifecycle-visual { margin: 20px 0; }
    .lifecycle-flow { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: 12px; }
    .lifecycle-node { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-size: 12px; font-weight: 600; text-align: center; min-width: 110px; transition: 0.15s; }
    .lifecycle-node.active { background: var(--accent-soft); border-color: rgba(30,58,95,0.25); color: var(--accent); }
    .lifecycle-node.complete-node { background: var(--good-soft); border-color: #a0c8b0; color: var(--good); }
    .lifecycle-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }
    .lifecycle-node small { display: block; font-weight: 400; font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ── BRANCHING SCENARIO ENGINE ── */
    .branch-engine { margin: 20px 0; border: 2px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
    .branch-header { padding: 16px 20px; background: linear-gradient(180deg,#fdfcf9,#f6f4ef); border-bottom: 1px solid var(--line); }
    .branch-header h4 { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
    .branch-progress { display: flex; gap: 6px; margin-top: 10px; }
    .branch-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--panel-muted); border: 1px solid var(--line); }
    .branch-dot.done { background: var(--good); border-color: var(--good); }
    .branch-dot.current { background: var(--accent); border-color: var(--accent); }
    .branch-body { padding: 20px; }
    .branch-narrative { padding: 16px; border-radius: 10px; background: linear-gradient(180deg,#fefcf8,#faf8f2); border: 1px solid #e0dbd0; margin-bottom: 16px; }
    .branch-narrative .bn-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
    .branch-narrative p { font-size: 14px; color: var(--text); line-height: 1.7; }
    .branch-question { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .branch-options { display: grid; gap: 8px; }
    .branch-opt { font: inherit; font-size: 13px; padding: 12px 14px; border-radius: 10px; background: var(--panel-soft); color: var(--text); border: 1px solid var(--line); cursor: pointer; transition: 0.12s; text-align: left; }
    .branch-opt:hover { background: var(--accent-soft); border-color: rgba(30,58,95,0.2); }
    .branch-opt.chosen-good { background: var(--good-soft); border-color: #8ec8a3; }
    .branch-opt.chosen-ok { background: var(--amber-soft); border-color: #ddc490; }
    .branch-opt.chosen-bad { background: var(--rose-soft); border-color: #d8a0b0; }
    .branch-consequence { margin-top: 14px; padding: 14px; border-radius: 10px; border: 1px solid var(--line); }
    .branch-consequence.good { background: var(--good-soft); border-color: #b0d4be; }
    .branch-consequence.ok { background: var(--amber-soft); border-color: #ddc490; }
    .branch-consequence.bad { background: var(--rose-soft); border-color: #d8a0b0; }
    .branch-consequence h5 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }

    let selectedAnswers = {};

    const visualState = {
      fundamentalsStep: 0,
      detectionMethod: 'caseReview',
      detectionCounts: { a: 18, b: 90, c: 24, d: 420 },
      // SDR triage
      sdrPicks: [],         // indices into sdrRows that the learner has picked (ordered)
      sdrSubmitted: false,  // has the learner submitted their triage?
      // Evaluation
      evaluation: { chronology: 70, dechallenge: 65, plausibility: 55, confounding: 35, consistency: 60, seriousness: 80 },
      // Evaluation challenge
      evalChallengeVerdict: null,   // 'agree' | 'disagree' | null
      evalChallengeReason: null,    // index into disagreeReasons
      evalChallengeSubmitted: false,
      // Action
      action: { seriousness: 'high', certainty: 'moderate', mechanism: 'clinical' },
      scenario: 'rash',
      scenarioStep: 'detect',
      memoryReveal: { fundamentals: false, detection: false, evaluation: false, action: false, scenarios: false }
    };

    // Additional interactive state
    const appState = {
      regPanelOpen: {},
      branchStep: 0,
      branchChoices: [],
      branchComplete: false,
      icsrAnswers: {},
      icsrSubmitted: false,
      recallText: {},
      recallAssess: {},
    };

    function loadProgress() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return { ...defaultProgress };
        const p = JSON.parse(raw);
        if (!Array.isArray(p.completed)) return { ...defaultProgress };
        return {
          unlocked: Math.min(Math.max(p.unlocked || 0, 0), stages.length - 1),
          completed: p.completed.filter(i => Number.isInteger(i) && i >= 0 && i < stages.length)
        };
      } catch { return { ...defaultProgress }; }
    }
    function saveProgress() { localStorage.setItem(storageKey, JSON.stringify(progress)); }
    function isCompleted(i) { return progress.completed.includes(i); }
    function isUnlocked(i) { return i <= progress.unlocked; }

    // ═══════════════════════════════════════════
    // MODULE NAV
    // ═══════════════════════════════════════════
    function renderModuleNav() {
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = modules.map(m => {
        const cls = m.id === activeModuleId ? 'active' : (!m.active ? 'disabled' : '');
        const dot = m.id === activeModuleId ? 'active' : (m.active ? '' : '');
        return `<button class="module-tab ${cls}" data-module="${m.id}" ${!m.active ? 'disabled' : ''}>
          <span class="tab-dot ${dot}"></span>${m.icon} ${m.title}${!m.active ? ' ᐧ Soon' : ''}
        </button>`;
      }).join('');
      nav.querySelectorAll('.module-tab:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
          activeModuleId = btn.dataset.module;
          renderAll();
        });
      });
    }

    // ═══════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════
    function renderSidebar() {
      const area = document.getElementById('sidebarArea');
      if (activeModuleId !== 'signal-management') { area.innerHTML = ''; return; }

      const pct = (progress.completed.length / stages.length) * 100;
      area.innerHTML = `
        <div class="sidebar-card">
          <div class="sidebar-header">
            <h3>Signal Management</h3>
            <p>Module 1 of 6 • 5 stages</p>
          </div>
          <div class="stage-list" id="stageList">
            ${stages.map((s, i) => {
              const complete = isCompleted(i);
              const current = i === activeStageIndex;
              const unlocked = isUnlocked(i);
              const cls = complete ? 'complete' : current ? 'active' : !unlocked ? 'locked' : '';
              const badge = complete ? '<span class="stage-badge done">Done</span>'
                : current ? '<span class="stage-badge current">Current</span>'
                : !unlocked ? '<span class="stage-badge locked-badge">Locked</span>' : '';
              return `<button class="stage-item ${cls}" data-idx="${i}" ${!unlocked ? 'disabled' : ''}>
                <div class="stage-num">${i + 1}</div>
                <div class="stage-info">
                  <span class="stage-name">${s.navTitle}</span>
                  <span class="stage-hint">${s.short}</span>
                </div>
                ${badge}
              </button>`;
            }).join('')}
          </div>
          <div class="sidebar-progress">
            <div class="progress-label">${progress.completed.length} / ${stages.length} stages complete</div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="sidebar-footer">
            <button class="reset-btn" id="sidebarResetBtn">Reset all progress</button>
          </div>
        </div>
      `;

      area.querySelectorAll('.stage-item:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          activeStageIndex = Number(btn.dataset.idx);
          renderContent();
          renderSidebar();
          updateNavProgress();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
      const resetBtn = document.getElementById('sidebarResetBtn');
      if (resetBtn) resetBtn.addEventListener('click', resetProgress);
    }

    function updateNavProgress() {
      const pill = document.getElementById('navProgressPill');
      if (pill) pill.textContent = `${progress.completed.length} / ${stages.length} complete`;
    }

    // ═══════════════════════════════════════════
    // CONTENT RENDERING
    // ═══════════════════════════════════════════
    function renderContent() {
      const area = document.getElementById('contentArea');

      if (activeModuleId !== 'signal-management') {
        const m = modules.find(x => x.id === activeModuleId);
        area.innerHTML = `
          <div class="module-landing">
            <div class="ml-icon">${m ? m.icon : '📦'}</div>
            <h2>${m ? m.title : 'Module'}</h2>
            <p>This module is under development and will cover key PV concepts, regulatory requirements, practical workflows, and scenario-based assessments.</p>
            <div class="coming-pill">Coming Soon</div>
          </div>
        `;
        return;
      }

      renderHeroBanner(area);
    }

    function renderHeroBanner(area) {
      const stage = stages[activeStageIndex];
      area.innerHTML = `
        <div class="hero-banner">
          <div class="hero-inner">
            <div>
              <div class="hero-eyebrow">Module 1 — Signal Management</div>
              <h1 class="hero-title">Learn signal management from fundamentals to real-world decisions</h1>
              <p class="hero-desc">Five progressive stages covering what signals are, how to detect and evaluate them, how to choose proportionate action, and how to integrate everything through realistic scenarios.</p>
            </div>
            <div class="hero-stats">
              <div class="hero-stat"><strong>5</strong><span>Stages</span></div>
              <div class="hero-stat"><strong>${progress.completed.length}</strong><span>Done</span></div>
            </div>
          </div>
        </div>
        <div class="stage-card" id="stageCard"></div>
        <div class="locked-panel" id="lockedPanel"></div>
      `;
      renderStageContent();
    }

    // ── Analogy helper ──
    function getAnalogy(stageId, bucket, title) {
      return analogyMap[stageId]?.[bucket]?.[title] || '';
    }
    function renderAnalogy(stageId, bucket, title) {
      const a = getAnalogy(stageId, bucket, title);
      if (!a) return '';
      return `<div class="analogy-tag"><strong>Analogy:</strong> ${a}</div>`;
    }

    // ── Memory section with active recall ──
    function renderMemorySection(stage) {
      const mem = analogyMap[stage.id]?.memory;
      if (!mem) return '';
      const revealed = visualState.memoryReveal[stage.id];
      const recallText = appState.recallText[stage.id] || '';
      const assessed = appState.recallAssess[stage.id] || null;
      return `
        <div class="memory-shell">
          <div class="memory-header">
            <span class="pill pill-amber">Sticky Learning</span>
            <h4>${mem.hook}</h4>
          </div>
          <div class="memory-grid">
            <div class="memory-card">
              <h4>Recall</h4>
              <p>${mem.question}</p>
              <textarea class="recall-textarea" id="recallInput-${stage.id}" placeholder="Write your answer first…">${recallText}</textarea>
              <button class="reveal-btn" data-memory-stage="${stage.id}">${revealed ? 'Hide' : 'Compare with model answer'}</button>
              ${revealed ? `
                <div class="result-box" style="margin-top:8px"><p style="margin:0">${mem.answer}</p></div>
                <div class="self-assess-row" id="selfAssess-${stage.id}">
                  <button class="self-assess-btn ${assessed==='close'?'assessed':''}" data-assess="${stage.id}" data-grade="close">Nailed it</button>
                  <button class="self-assess-btn ${assessed==='partial'?'assessed':''}" data-assess="${stage.id}" data-grade="partial">Partial</button>
                  <button class="self-assess-btn ${assessed==='missed'?'assessed':''}" data-assess="${stage.id}" data-grade="missed">Missed</button>
                </div>
                ${assessed ? `<p style="font-size:11px;color:var(--muted);margin-top:4px">${assessed==='close'?'Solidifying well.':assessed==='partial'?'Revisit concepts above.':'Re-read and retry later.'}</p>` : ''}
              ` : ''}
            </div>
            <div class="memory-card">
              <h4>Elaborate</h4>
              <p>${mem.elaborate}</p>
              <div class="analogy-tag" style="margin-top:8px"><strong>Hint:</strong> ${mem.elaborateHint}</div>
            </div>
            <div class="memory-card">
              <h4>Visualise</h4>
              <div class="visual-chip-row" style="margin-top:0">
                ${mem.visuals.map(v => `<div class="icon-chip"><span>${v.icon}</span><strong>${v.title}</strong><p>${v.text}</p></div>`).join('')}
              </div>
            </div>
            <div class="memory-card">
              <h4>Teach back</h4>
              <textarea class="recall-textarea" id="teachBack-${stage.id}" placeholder="Explain in two sentences…" style="min-height:48px">${appState.recallText[stage.id+'_teach'] || ''}</textarea>
              <p style="font-size:12px;color:var(--muted);margin-top:6px"><strong>Cross-link:</strong> ${mem.interleave}</p>
            </div>
          </div>
        </div>
      `;
    }

    // ── Regulatory context panel ──
    function renderRegPanel(stageId) {
      const refs = regulatoryContext[stageId];
      if (!refs) return '';
      const open = appState.regPanelOpen[stageId];
      return `
        <div class="reg-panel">
          <div class="reg-panel-header" data-reg-toggle="${stageId}">
            <div class="reg-icon">§</div>
            <h4>Regulatory Context — GVP & ICH References</h4>
            <span class="reg-toggle">${open ? '▼ Hide' : '▶ Show'}</span>
          </div>
          <div class="reg-panel-body ${open ? 'open' : ''}">
            ${refs.map(r => `<div class="reg-ref"><div class="reg-ref-key">${r.key}</div><div class="reg-ref-val">${r.val}</div></div>`).join('')}
          </div>
        </div>
      `;
    }

    // ── Signal Lifecycle visual ──
    function renderLifecycleVisual() {
      const stageMap = { fundamentals: 'data', detection: 'detect', evaluation: 'assess', action: 'action', scenarios: 'track' };
      const currentNode = stageMap[stages[activeStageIndex].id] || 'data';
      const passedIdx = lifecycleNodes.findIndex(n => n.id === currentNode);
      return `
        <div class="lifecycle-visual">
          <div class="section-divider"><h3>Signal Lifecycle → PSUR → RMP</h3><p>How signals flow from detection through aggregate reporting and risk management.</p></div>
          <div class="lifecycle-flow">
            ${lifecycleNodes.map((n, i) => {
              const cls = i < passedIdx ? 'complete-node' : i === passedIdx ? 'active' : '';
              const arrow = i < lifecycleNodes.length - 1 ? '<span class="lifecycle-arrow">→</span>' : '';
              return `<div class="lifecycle-node ${cls}"><strong>${n.label}</strong><small>${n.sub}</small></div>${arrow}`;
            }).join('')}
          </div>
        </div>
      `;
    }

    // ── ICSR Exercise ──
    function renderIcsrExercise() {
      const ex = icsrExercise;
      return `
        <div class="icsr-exercise">
          <div class="visual-head">
            <span class="pill pill-amber">Practice Exercise</span>
            <h4>${ex.title}</h4>
            <p>${ex.intro}</p>
          </div>
          <div class="icsr-narrative-box">${ex.narrative.replace(/\n/g, '<br>')}</div>
          <div class="icsr-question-grid" id="icsrGrid">
            ${ex.questions.map((q, qi) => {
              const answered = appState.icsrAnswers[qi];
              return `<div class="icsr-q-card"><h5>${q.q}</h5><div class="icsr-options">${q.options.map((o, oi) => {
                let cls = 'icsr-opt';
                if (answered === oi && o.correct) cls += ' correct';
                if (answered === oi && !o.correct) cls += ' wrong';
                if (answered != null && o.correct && answered !== oi) cls += ' correct';
                return `<button class="${cls}" data-icsr-q="${qi}" data-icsr-o="${oi}" ${answered != null ? 'disabled' : ''}>${o.text}</button>`;
              }).join('')}</div></div>`;
            }).join('')}
          </div>
          ${Object.keys(appState.icsrAnswers).length === ex.questions.length ? `
            <div class="result-box" style="margin-top:14px">
              <p style="margin:0"><strong>Score: ${ex.questions.filter((q,i) => q.options[appState.icsrAnswers[i]]?.correct).length}/${ex.questions.length} correct.</strong> 
              This case demonstrates a well-documented ICSR that supports the hepatotoxicity signal: plausible onset, positive dechallenge, low confounding, and consistency with the broader case series pattern. Notably, the case also meets Hy\'s Law criteria (ALT 8× ULN + bilirubin 2.1× ULN), which is an important prognostic indicator of severe DILI risk — recognising this is a key clinical skill in hepatotoxicity signal evaluation.</p>
            </div>
          ` : ''}
        </div>
      `;
    }

    // ── Branching Scenario Engine ──
    function renderBranchingEngine() {
      const bs = branchingScenario;
      const step = appState.branchStep;
      const totalSteps = bs.steps.length;
      const currentStep = bs.steps[step];

      if (appState.branchComplete) {
        const totalPoints = appState.branchChoices.reduce((sum, c) => sum + c.points, 0);
        const maxPoints = totalSteps * 3;
        const pct = Math.round((totalPoints / maxPoints) * 100);
        const grade = pct >= 80 ? 'Expert-level crisis management' : pct >= 50 ? 'Good instincts, room for improvement' : 'Needs further development';
        return `
          <div class="branch-engine">
            <div class="branch-header">
              <span class="pill pill-amber">Branching Scenario</span>
              <h4>${bs.title} — Complete</h4>
              <div class="branch-progress">${bs.steps.map(() => '<div class="branch-dot done"></div>').join('')}</div>
            </div>
            <div class="branch-body">
              <div class="branch-summary">
                <h4 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:8px">${grade}</h4>
                <div class="branch-score-row">
                  <div class="branch-score-item"><strong>${totalPoints}</strong><span>Points</span></div>
                  <div class="branch-score-item"><strong>${maxPoints}</strong><span>Maximum</span></div>
                  <div class="branch-score-item"><strong>${pct}%</strong><span>Score</span></div>
                  <div class="branch-score-item"><strong>${appState.branchChoices.filter(c=>c.points===3).length}</strong><span>Optimal</span></div>
                </div>
                <div style="margin-top:14px">
                  ${appState.branchChoices.map((c, i) => `
                    <div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:13px">
                      <strong>Step ${i+1}:</strong> <span style="color:${c.points===3?'var(--good)':c.points===1?'var(--amber)':'var(--rose)'}">${c.points===3?'Optimal':c.points===1?'Partial':'Missed'}</span> — ${c.text.slice(0,80)}…
                    </div>
                  `).join('')}
                </div>
              </div>
              <button class="branch-next-btn" id="branchResetBtn" style="margin-top:14px">Replay Scenario</button>
            </div>
          </div>
        `;
      }

      const choice = appState.branchChoices[step];
      return `
        <div class="branch-engine">
          <div class="branch-header">
            <span class="pill pill-amber">Branching Scenario</span>
            <h4>${bs.title}</h4>
            <p style="font-size:13px;color:var(--muted);margin-top:4px">${bs.intro}</p>
            <div class="branch-progress">${bs.steps.map((_, i) => `<div class="branch-dot ${i < step ? 'done' : i === step ? 'current' : ''}"></div>`).join('')}</div>
          </div>
          <div class="branch-body">
            <div class="branch-narrative">
              <div class="bn-label">Step ${step + 1} of ${totalSteps}</div>
              <p>${currentStep.narrative}</p>
            </div>
            <div class="branch-question">${currentStep.question}</div>
            <div class="branch-options" id="branchOptions">
              ${currentStep.options.map((o, i) => {
                let cls = 'branch-opt';
                if (choice && choice.idx === i) cls += ` chosen-${o.quality}`;
                return `<button class="${cls}" data-branch-opt="${i}" ${choice ? 'disabled' : ''}>${o.text}</button>`;
              }).join('')}
            </div>
            ${choice ? `
              <div class="branch-consequence ${choice.quality}">
                <h5>${choice.quality === 'good' ? '✓ Optimal Choice' : choice.quality === 'ok' ? '~ Partial Credit' : '✗ Suboptimal Choice'} (${choice.points}/3 points)</h5>
                <p>${currentStep.options[choice.idx].consequence}</p>
              </div>
              ${step < totalSteps - 1 ? '<button class="branch-next-btn" id="branchNextBtn">Continue to next step →</button>' : '<button class="branch-next-btn" id="branchFinishBtn">See final results</button>'}
            ` : ''}
          </div>
        </div>
      `;
    }

    // ── Competency Assessment ──
    function renderCompetencyPanel() {
      if (progress.completed.length < stages.length) return '';
      const checkpointResults = stages.map((s, i) => {
        const answer = selectedAnswers[i];
        return { stage: s.navTitle, passed: answer === s.checkpoint.correct, answer };
      });
      const allPassed = checkpointResults.every(r => r.passed);
      const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      return `
        <div class="competency-panel" id="competencyPanel">
          <div class="competency-header">
            <h3>🎓 Module Complete — Signal Management</h3>
            <p>Completed on ${dateStr}</p>
          </div>
          <div class="competency-body">
            <div class="comp-score-grid">
              ${stages.map((s, i) => `
                <div class="comp-score-card ${isCompleted(i) ? 'passed' : ''}">
                  <strong>${isCompleted(i) ? '✓' : '—'}</strong>
                  <span>${s.navTitle}</span>
                </div>
              `).join('')}
            </div>
            <div class="comp-summary">
              <p><strong>Module:</strong> Signal Management (Module 1 of 6)</p>
              <p><strong>Stages completed:</strong> ${progress.completed.length} / ${stages.length}</p>
              <p><strong>Checkpoint format:</strong> Scenario-based judgment questions (not recall-based)</p>
              <p><strong>Interactive exercises:</strong> SDR triage, evaluation challenge, ICSR assessment, branching crisis scenario</p>
              <p><strong>Evidence of competency:</strong> Ability to detect, evaluate, and act on safety signals proportionately, with awareness of regulatory requirements (GVP IX) and real-world decision-making under uncertainty.</p>
            </div>
            <button class="comp-export-btn" id="compExportBtn">Print / Export Training Record</button>
          </div>
        </div>
      `;
    }

            <div class="section-divider"><h3>Common tools and data systems</h3><p>${stage.toolsSub || ''}</p></div>

                <div class="tool-item">
                  <h4>${t.title}</h4>
