                <div class="vig-label">Case Vignette</div>
                <p>${stage.checkpoint.vignette.replace(/\n/g, '<br>')}</p>
              </div>
              <div class="checkpoint-question">${stage.checkpoint.question}</div>
              <div class="checkpoint-options" id="checkpointOptions">
                ${stage.checkpoint.options.map((opt, i) => {
                  let cls = 'option-btn';
                  if (answered === i && i === stage.checkpoint.correct) cls += ' selected-correct';
                  if (answered === i && i !== stage.checkpoint.correct) cls += ' selected-wrong';
                  return `<button class="${cls}" data-opt="${i}">${opt}</button>`;
                }).join('')}
              </div>
              <div class="checkpoint-feedback ${answered == null ? '' : isCorrect ? 'good' : 'warn'}" id="ckFeedback">
                ${answered != null ? `<strong>${isCorrect ? stage.checkpoint.successTitle : stage.checkpoint.failTitle}</strong>${isCorrect ? stage.checkpoint.successText : stage.checkpoint.failText}` : ''}
              </div>
              <div class="checkpoint-explanation ${answered != null && stage.checkpoint.explanation ? 'show' : ''}" id="ckExplanation">
                ${stage.checkpoint.explanation ? `<h5>Why this matters</h5><p>${stage.checkpoint.explanation}</p>` : ''}
              </div>
              <div class="checkpoint-actions">
                <span class="small-note">Pass the checkpoint to unlock the next stage.</span>
                ${activeStageIndex < stages.length - 1 && completed
                  ? `<button class="next-stage-btn" id="nextStageBtn">Continue to ${stages[activeStageIndex + 1].navTitle} →</button>`
                  : activeStageIndex === stages.length - 1 && completed
                    ? '<span class="pill pill-good">All stages complete</span>'
                    : ''}
              </div>
            </div>
          </div>

          <!-- REFERENCE -->
          <div class="reference-card">
            <h4>Teaching note</h4>
            <ul>
              <li>This module keeps language plain on purpose, but methods shown reflect real pharmacovigilance practice.</li>
              <li>Algorithms and scores help <strong>prioritize attention</strong>. They do not replace clinical review.</li>
              <li>Checkpoints test judgment, not just recall — just like real signal management decisions.</li>
              <li>Regulatory references (GVP IX, ICH E2C/E2D) are mapped to each stage for cross-reference.</li>
            </ul>
          </div>

          <!-- COMPETENCY ASSESSMENT -->
          ${renderCompetencyPanel()}
        </div>
      `;

      // Bind events
      card.querySelectorAll('#checkpointOptions .option-btn').forEach(btn => {
        btn.addEventListener('click', () => handleCheckpointAnswer(Number(btn.dataset.opt)));
      });

      const nextBtn = document.getElementById('nextStageBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          if (activeStageIndex < stages.length - 1) {
            activeStageIndex++;
            renderContent(); renderSidebar(); updateNavProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      }

      card.querySelectorAll('[data-memory-stage]').forEach(btn => {
        btn.addEventListener('click', () => {
          visualState.memoryReveal[btn.dataset.memoryStage] = !visualState.memoryReveal[btn.dataset.memoryStage];
          renderStageContent();
        });
      });

      // Recall text persistence
      card.querySelectorAll('.recall-textarea').forEach(ta => {
        ta.addEventListener('input', () => {
          const id = ta.id.replace('recallInput-','').replace('teachBack-','');
          if (ta.id.startsWith('teachBack-')) appState.recallText[id+'_teach'] = ta.value;
          else appState.recallText[id] = ta.value;
        });
      });

      // Self-assessment buttons
      card.querySelectorAll('[data-assess]').forEach(btn => {
        btn.addEventListener('click', () => {
          appState.recallAssess[btn.dataset.assess] = btn.dataset.grade;
          renderStageContent();
        });
      });

      // Regulatory panel toggle
      card.querySelectorAll('[data-reg-toggle]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.regToggle;
          appState.regPanelOpen[id] = !appState.regPanelOpen[id];
          renderStageContent();
        });
      });

      // ICSR exercise
      card.querySelectorAll('[data-icsr-q]').forEach(btn => {
        if (appState.icsrAnswers[btn.dataset.icsrQ] != null) return;
        btn.addEventListener('click', () => {
          appState.icsrAnswers[Number(btn.dataset.icsrQ)] = Number(btn.dataset.icsrO);
          renderStageContent();
        });
      });

      // Branching scenario
      card.querySelectorAll('[data-branch-opt]').forEach(btn => {
        if (appState.branchChoices[appState.branchStep]) return;
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.branchOpt);
          const step = branchingScenario.steps[appState.branchStep];
          const opt = step.options[idx];
          appState.branchChoices[appState.branchStep] = { idx, text: opt.text, quality: opt.quality, points: opt.points };
          renderStageContent();
        });
      });
      const branchNext = document.getElementById('branchNextBtn');
      if (branchNext) branchNext.addEventListener('click', () => {
        appState.branchStep++;
        renderStageContent();
      });
      const branchFinish = document.getElementById('branchFinishBtn');
      if (branchFinish) branchFinish.addEventListener('click', () => {
        appState.branchComplete = true;
        renderStageContent();
      });
      const branchReset = document.getElementById('branchResetBtn');
      if (branchReset) branchReset.addEventListener('click', () => {
        appState.branchStep = 0;
        appState.branchChoices = [];
        appState.branchComplete = false;
        renderStageContent();
      });

      // Competency export
      const compExport = document.getElementById('compExportBtn');
      if (compExport) compExport.addEventListener('click', () => window.print());

      bindStageVisuals(stage.id);
    }

    function handleCheckpointAnswer(optionIndex) {
      const stage = stages[activeStageIndex];
      selectedAnswers[activeStageIndex] = optionIndex;
      if (optionIndex === stage.checkpoint.correct && !isCompleted(activeStageIndex)) {
        progress.completed.push(activeStageIndex);
        progress.completed.sort((a, b) => a - b);
        if (activeStageIndex < stages.length - 1) {
          progress.unlocked = Math.max(progress.unlocked, activeStageIndex + 1);
        }
        saveProgress();
      }
      renderStageContent(); renderSidebar(); updateNavProgress();
    }

    function resetProgress() {
      progress = { ...defaultProgress, completed: [] };
      activeStageIndex = 0;
      selectedAnswers = {};
      visualState.sdrPicks = [];
      visualState.sdrSubmitted = false;
      visualState.evalChallengeVerdict = null;
      visualState.evalChallengeReason = null;
      visualState.evalChallengeSubmitted = false;
      appState.branchStep = 0;
      appState.branchChoices = [];
      appState.branchComplete = false;
      appState.icsrAnswers = {};
      appState.recallText = {};
      appState.recallAssess = {};
      appState.regPanelOpen = {};
      saveProgress();
      renderAll();
    }

    // ═══════════════════════════════════════════
    // INTERACTIVE VISUALS
    // ═══════════════════════════════════════════
    function renderStageVisual(stageId) {
      if (stageId === 'fundamentals') return renderFundamentalsVisual();
      if (stageId === 'detection') return renderDetectionVisual();
      if (stageId === 'evaluation') return renderEvaluationVisual();
      if (stageId === 'action') return renderActionVisual();
      if (stageId === 'scenarios') return renderScenarioVisual();
      return '';
    }

    function renderFundamentalsVisual() {
      const steps = [
        { title: 'Raw data point', text: 'A case, a trend, a literature item, or an error complaint.' },
        { title: 'Possible signal', text: 'Someone notices a question worth attention.' },
        { title: 'Validated signal', text: 'Enough substance to treat as a real review topic.' },
        { title: 'Assessed issue', text: 'Team weighs quality, chronology, plausibility, and impact.' },
        { title: 'Action and follow-up', text: 'Proportionate response, then watch for change.' }
      ];
      const detailData = [
        { title: 'Raw data point', text: 'This might be a spontaneous report, a literature case, an error complaint, or a trend. At this point, it is just information.', learn: 'The key question is whether the information is noteworthy enough to move beyond routine noise.' },
        { title: 'Possible signal', text: 'Now someone sees a reason to look closer. Maybe the event is new, serious, clustered, or medically coherent.', learn: 'This is the point where curiosity becomes structured review.' },
        { title: 'Validated signal', text: 'There is now enough substance to treat the issue as a true review topic. Validation is about deciding the clue is worth formal handling.', learn: 'Validation is not the same as proving causality. It means the issue deserves further work.' },
        { title: 'Assessed issue', text: 'Reviewers compare cases, test chronology, look for confounding, check plausibility, and consider seriousness.', learn: 'This is where signal evaluation becomes disciplined judgment.' },
        { title: 'Action and follow-up', text: 'A proportionate action is chosen, and then the team checks whether patients are actually safer afterward.', learn: 'Tracking is part of signal management, not an optional extra.' }
      ];
      return `
        <div class="visual-shell">
          <div class="visual-head">
            <span class="pill pill-accent">Interactive Visual</span>
            <h4>The Signal Ladder</h4>
            <p>Click each step to see how a weak clue becomes a managed safety issue.</p>
          </div>
          <div class="visual-body">
            <div class="ladder" id="fundamentalsLadder">
              ${steps.map((s, i) => `
                <div class="ladder-step ${visualState.fundamentalsStep === i ? 'active' : ''}" data-step="${i}">
                  <div class="ladder-num">${i + 1}</div>
                  <h4>${s.title}</h4>
                  <p>${s.text}</p>
                </div>
              `).join('')}
            </div>
            <div class="interactive-card" id="fundamentalsDetail">
              <h4>${detailData[visualState.fundamentalsStep].title}</h4>
              <p>${detailData[visualState.fundamentalsStep].text}</p>
              <div class="result-box" style="margin-top:10px">
                <p style="margin:0"><strong>Key learning:</strong> ${detailData[visualState.fundamentalsStep].learn}</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDetectionVisual() {
      const m = detectionMethods[visualState.detectionMethod];

      // SDR table
      const picks = visualState.sdrPicks;
      const submitted = visualState.sdrSubmitted;

      // Score the learner's picks
      let sdrGrade = '';
      let sdrFeedbackClass = '';
      let sdrFeedbackHtml = '';
      if (submitted) {
        const topHits = picks.filter(i => sdrTopPriorities.includes(i)).length;
        const goodHits = picks.filter(i => sdrGoodPicks.includes(i)).length;
        const score = topHits * 2 + goodHits;
        if (topHits === 3) { sdrGrade = 'excellent'; sdrFeedbackClass = 'excellent'; }
        else if (topHits >= 2) { sdrGrade = 'partial'; sdrFeedbackClass = 'partial'; }
        else { sdrGrade = 'needs-work'; sdrFeedbackClass = 'needs-work'; }

        const gradeTitle = sdrGrade === 'excellent' ? 'Excellent triage — expert-level prioritization'
          : sdrGrade === 'partial' ? 'Good instincts — but you missed a high-priority signal'
          : 'Review your reasoning — some critical signals were missed';

        const picked = picks.map(i => sdrRows[i].id).join(', ');
        const missed = sdrTopPriorities.filter(i => !picks.includes(i)).map(i => sdrRows[i].id);
        const missedText = missed.length ? `<p><strong>Missed high-priority flags:</strong> ${missed.map(i => `Row ${i}`).join(', ')}. These are unlabeled, serious, DME/class-effect events that require urgent review regardless of case count.</p>` : '';
        const lowPri = picks.filter(i => !sdrTopPriorities.includes(i) && !sdrGoodPicks.includes(i));
        const lowText = lowPri.length ? `<p><strong>Lower-priority picks:</strong> Rows ${lowPri.map(i => sdrRows[i].id).join(', ')} are labeled, common, or non-specific events that don't warrant the same urgency. High case counts don't equal high priority.</p>` : '';

        sdrFeedbackHtml = `
          <h5>${gradeTitle}</h5>
          <p><strong>Your selections:</strong> ${picked}</p>
          ${missedText}${lowText}
          <p style="margin-top:8px"><strong>Expert ranking logic:</strong> Prioritize by (1) unlabeled status + seriousness, (2) DME/class-effect relevance, (3) signal strength and clinical coherence, (4) phenotype shifts within known risks, (5) preventable operational mechanisms. Case volume alone is never the primary driver. Also note: a confidence interval crossing 1.0 (as in Row H) means the disproportionality is not statistically significant — but the signal can still be clinically important if the mechanism is clear and actionable.</p>
          <div class="sdr-rationale-row">
            ${sdrExpertRationale.slice(0, 3).map(r => `
              <div class="sdr-rationale-card">
                <h6>#${r.rank} — ${r.id}: ${r.title}</h6>
                <p>${r.reason}</p>
              </div>
            `).join('')}
          </div>
          <div class="sdr-rationale-row" style="margin-top:8px">
            ${sdrExpertRationale.slice(3).map(r => `
              <div class="sdr-rationale-card">
                <h6>#${r.rank} — ${r.id}: ${r.title}</h6>
                <p>${r.reason}</p>
              </div>
            `).join('')}
          </div>
        `;
      }

      return `
        <div class="visual-shell">
          <div class="visual-head">
            <span class="pill pill-accent">Interactive Visual</span>
            <h4>Methods Explorer</h4>
            <p>Select a detection method to learn when it works best and what to watch for.</p>
          </div>
          <div class="chip-row" id="detectionMethodChips" style="margin-bottom:14px">
            ${Object.entries(detectionMethods).map(([k, v]) =>
              `<button class="chip-btn ${visualState.detectionMethod === k ? 'active' : ''}" data-method="${k}">${v.title.split(' and ')[0].split(' ')[0]}${k==='algorithms'?' algo':''}</button>`
            ).join('')}
          </div>
          <div class="interactive-card" style="margin-bottom:0">
            <h4>${m.title}</h4>
            <p>${m.text}</p>
            <div class="result-box" style="margin-top:10px">
              <p style="margin:0 0 6px"><strong>Why use it:</strong> ${m.why}</p>
              <p style="margin:0"><strong>Main caution:</strong> ${m.caution}</p>
            </div>
          </div>
        </div>

        <div class="visual-shell" style="margin-top:16px">
          <div class="visual-head">
            <span class="pill pill-amber">Practice Exercise</span>
            <h4>SDR Triage — Prioritize Signal Review</h4>
            <p>Below is a simulated Signal Detection Review output for <strong>Veritanib</strong> (a fictional kinase inhibitor, 14 months post-launch). You have bandwidth to deeply review <strong>3 flags this quarter</strong>. Click the rank column to select your top 3 priorities in order, then submit for expert comparison.</p>
          </div>

          <div class="sdr-table-wrap">
            <table class="sdr-table">
              <thead>
                <tr>
                  <th class="sdr-rank-cell">Rank</th>
                  <th>Row</th>
                  <th>Event (PT)</th>
                  <th>ROR (95% CI)</th>
                  <th>PRR</th>
                  <th>N</th>
                  <th>Serious</th>
                  <th>Fatal</th>
                  <th>Status</th>
                  <th>Flags</th>
                </tr>
              </thead>
              <tbody id="sdrTableBody">
                ${sdrRows.map((row, idx) => {
                  const pickIndex = picks.indexOf(idx);
                  const isSelected = pickIndex >= 0;
                  const rorWidth = Math.min(100, (row.ror / 6) * 100);

                  let rowClass = '';
                  let rankBtnClass = 'sdr-rank-btn';
                  let rankLabel = '+';
                  if (isSelected && !submitted) {
                    rowClass = 'sdr-selected';
                    rankBtnClass += ' ranked';
                    rankLabel = String(pickIndex + 1);
                  }
                  if (submitted) {
                    const isTopPri = sdrTopPriorities.includes(idx);
                    const isGoodPick = sdrGoodPicks.includes(idx);
                    if (isSelected && isTopPri) { rowClass = 'sdr-correct'; rankBtnClass += ' rank-correct'; rankLabel = isSelected ? String(pickIndex + 1) : ''; }
                    else if (isSelected && isGoodPick) { rowClass = 'sdr-correct'; rankBtnClass += ' rank-partial'; rankLabel = String(pickIndex + 1); }
                    else if (isSelected && !isTopPri && !isGoodPick) { rowClass = 'sdr-missed'; rankBtnClass += ' rank-partial'; rankLabel = String(pickIndex + 1); }
                    else if (!isSelected && isTopPri) { rowClass = 'sdr-missed'; }
                    else { rankLabel = ''; }
                  }

                  const flags = [];
                  if (row.dme) flags.push('<span class="sdr-tag dme">DME</span>');
                  if (row.classEffect) flags.push('<span class="sdr-tag class-effect">Class</span>');
                  if (row.ror >= 3.0) flags.push('<span class="sdr-tag high-ror">High ROR</span>');

                  return `<tr class="${rowClass}" data-sdr-idx="${idx}">
                    <td class="sdr-rank-cell"><button class="sdr-rank-btn ${submitted ? (isSelected ? rankBtnClass : '') : rankBtnClass}" data-sdr-pick="${idx}" ${submitted ? 'disabled' : ''}>${rankLabel}</button></td>
                    <td style="font-weight:700">${row.id}</td>
                    <td><span style="font-weight:600">${row.event}</span><br><span style="font-size:11px;color:var(--muted)">${row.ptTerm}</span></td>
                    <td><strong>${row.ror.toFixed(1)}</strong> <span style="font-size:10px;color:var(--muted)">(${row.ciLo}–${row.ciHi})</span><br><span class="sdr-ror-bar" style="width:${rorWidth}px"></span></td>
                    <td>${row.prr.toFixed(1)}</td>
                    <td><strong>${row.n}</strong></td>
                    <td>${row.serious}/${row.n} <span class="sdr-tag ${row.serious > row.n/2 ? 'serious' : 'non-serious'}">${row.serious > row.n/2 ? 'Mostly serious' : 'Mixed'}</span></td>
                    <td>${row.fatal > 0 ? '<strong style="color:var(--rose)">'+row.fatal+'</strong>' : '0'}</td>
                    <td><span class="sdr-tag ${row.labeled ? 'labeled' : 'unlabeled'}">${row.labeled ? 'Labeled' : 'Unlabeled'}</span></td>
                    <td>${flags.join(' ')}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>

          ${!submitted ? `
            <div style="margin-top:12px;padding:12px;border-radius:10px;background:var(--panel-soft);border:1px solid var(--line)">
              <p style="font-size:12px;color:var(--muted);margin:0"><strong style="color:var(--text)">Context for each flag</strong> — hover or review before choosing:</p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
                ${sdrRows.map(r => `<div style="padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:11px"><strong>${r.id}:</strong> <span style="color:var(--muted)">${r.context}</span></div>`).join('')}
              </div>
            </div>
          ` : ''}

          <div class="sdr-actions">
            <button class="sdr-submit-btn" id="sdrSubmitBtn" ${picks.length < 3 || submitted ? 'disabled' : ''}>
              ${submitted ? 'Submitted' : `Submit Top 3 (${picks.length}/3 selected)`}
            </button>
            <button class="sdr-reset-btn" id="sdrResetBtn">Reset Picks</button>
            <span class="small-note">${submitted ? '' : 'Click a row\'s + button to rank it. Click again to remove.'}</span>
          </div>

          <div class="sdr-feedback ${submitted ? 'show' : ''} ${sdrFeedbackClass}" id="sdrFeedback">
            ${sdrFeedbackHtml}
          </div>
        </div>
      `;
    }

    function renderEvaluationVisual() {
      const e = visualState.evaluation;
      const score = (e.chronology * 0.2) + (e.dechallenge * 0.18) + (e.plausibility * 0.14) + (e.confounding * 0.16) + (e.consistency * 0.14) + (e.seriousness * 0.18);
      const strength = score >= 65 ? 'Credible — warrants action planning' : score >= 40 ? 'Possible — needs more data' : 'Weak — monitor and gather information';
      const thumb = Math.min(100, Math.max(0, score));
      const summary = score >= 65 ? 'Evidence from multiple dimensions suggests a real issue.' : score >= 40 ? 'Some supporting evidence, but gaps remain.' : 'Too uncertain for confident conclusions.';

      // Determine which challenge scenario applies
      const challengeScenario = evalChallengeScenarios.find(s => s.condition(score));
      const cs = challengeScenario;
      const verdict = visualState.evalChallengeVerdict;
      const reasonIdx = visualState.evalChallengeReason;
      const chalSubmitted = visualState.evalChallengeSubmitted;

      // Build challenge feedback
      let challengeFeedbackHtml = '';
      let challengeFeedbackClass = '';
      if (chalSubmitted && cs) {
        if (verdict === 'agree') {
          if (cs.agreeCorrect) {
            challengeFeedbackClass = 'good';
            challengeFeedbackHtml = `<h5>Correct — you agreed with a sound recommendation.</h5><p>${cs.agreeReason}</p>`;
          } else {
            challengeFeedbackClass = 'warn';
            challengeFeedbackHtml = `<h5>Not quite — the recommendation has a gap.</h5><p>${cs.agreeReason}</p>`;
          }
        } else if (verdict === 'disagree' && reasonIdx != null) {
          const reason = cs.disagreeReasons[reasonIdx];
          if (reason.correct) {
            challengeFeedbackClass = 'good';
            challengeFeedbackHtml = `<h5>Correct — you identified the flaw.</h5><p>${reason.feedback}</p>`;
          } else {
            challengeFeedbackClass = 'warn';
            challengeFeedbackHtml = `<h5>Not the strongest objection.</h5><p>${reason.feedback}</p>`;
          }
        }
      }

      return `
        <div class="visual-shell">
          <div class="visual-head">
            <span class="pill pill-accent">Interactive Visual</span>
            <h4>Evaluation Weight Explorer</h4>
            <p>Adjust evidence dimensions to model different signal profiles, then challenge the system's recommendation below.</p>
            <p style="font-size:11px;color:var(--warn);margin-top:4px;font-weight:600">⚠ Teaching model only — This weighted scoring is a pedagogical simplification to illustrate how evidence dimensions interact. It is not a validated instrument and should not be used in real regulatory assessments. Real signal evaluation uses structured clinical judgment, not numerical scoring.</p>
          </div>
          <div class="visual-body">
            <div class="interactive-card">
              <h4>Evidence dimensions</h4>
              <p style="margin-bottom:10px">Drag each slider to reflect a hypothetical signal's evidence strength. Imagine evaluating the Veritanib hepatotoxicity signal — or any serious drug-event pair — and adjust each dimension to model the evidence you see.</p>
              <div class="controls-grid" id="evaluationControls">
                ${[['chronology','Chronology'],['dechallenge','Dechallenge'],['plausibility','Plausibility'],['confounding','Confounders excluded'],['consistency','Consistency'],['seriousness','Seriousness']].map(([k,l]) => `
                  <label class="field">${l}: <strong id="evalValue-${k}">${e[k]}</strong>
                    <input type="range" min="0" max="100" value="${e[k]}" data-eval="${k}" />
                  </label>
                `).join('')}
              </div>
            </div>
            <div class="interactive-card">
              <h4>Signal credibility</h4>
              <div class="score-box">
                <div class="stat-line"><span>Score</span><strong style="color:var(--text)" id="evaluationScore">${score.toFixed(0)} / 100</strong></div>
                <div class="stat-line"><span>Strength</span><strong style="color:var(--text)" id="evaluationStrength">${strength}</strong></div>
              </div>
              <div class="meter-shell">
                <div class="meter-track"><div class="meter-thumb" id="evaluationThumb" style="left:${thumb}%"></div></div>
                <div class="meter-labels"><span>Weak</span><span>Possible</span><span>Credible</span></div>
              </div>
              <div style="margin-top:12px">
                ${[['chronology','Chronology',e.chronology],['dechallenge','Dechallenge',e.dechallenge],['plausibility','Plausibility',e.plausibility],['confounding','Confounders excluded',e.confounding],['consistency','Consistency',e.consistency],['seriousness','Seriousness',e.seriousness]].map(([k,l,v]) => `
                  <div class="signal-bar">
                    <span>${l}</span>
                    <div class="bar-track"><div class="bar-fill" id="evaluationBar-${k}" style="width:${v}%"></div></div>
                    <strong style="color:var(--text)" id="evaluationBarValue-${k}">${v}</strong>
                  </div>
                `).join('')}
              </div>
              <div class="result-box" style="margin-top:10px" id="evaluationSummary"><p style="margin:0"><strong>Interpretation:</strong> ${summary}</p></div>
            </div>
          </div>
        </div>

        ${cs ? `
        <div class="eval-challenge">
          <div class="eval-challenge-header">
            <div class="ec-icon">⚡</div>
            <h4>Challenge the Recommendation</h4>
          </div>
          <div class="eval-challenge-body">
            <div class="eval-recommendation">
              <div class="rec-label">System Recommendation — "${cs.title}"</div>
              <p>${cs.recommendation}</p>
            </div>

            <p style="font-size:14px;font-weight:600;margin-bottom:10px;font-family:var(--font-display)">Do you agree with this recommendation given the current evidence profile?</p>

            <div class="eval-verdict-row" id="evalVerdictRow">
              <button class="eval-verdict-btn ${verdict==='agree' ? (chalSubmitted ? (cs.agreeCorrect ? 'selected-agree' : 'selected-disagree') : 'selected-agree') : ''}" data-verdict="agree" ${chalSubmitted ? 'disabled' : ''}>
                ✓ &nbsp;Agree — this is proportionate
              </button>
              <button class="eval-verdict-btn ${verdict==='disagree' ? 'selected-disagree' : ''}" data-verdict="disagree" ${chalSubmitted ? 'disabled' : ''}>
                ✗ &nbsp;Disagree — I see a problem
              </button>
            </div>

            ${verdict === 'disagree' ? `
              <p style="font-size:13px;font-weight:600;margin-bottom:8px">Why do you disagree? Select the strongest objection:</p>
              <div class="eval-reason-grid" id="evalReasonGrid">
                ${cs.disagreeReasons.map((r, i) => {
                  let cls = 'eval-reason-btn';
                  if (reasonIdx === i && !chalSubmitted) cls += ' chosen';
                  if (chalSubmitted && reasonIdx === i && r.correct) cls += ' reason-correct';
                  if (chalSubmitted && reasonIdx === i && !r.correct) cls += ' reason-wrong';
                  if (chalSubmitted && r.correct && reasonIdx !== i) cls += ' reason-correct';
                  return `<button class="${cls}" data-reason="${i}" ${chalSubmitted ? 'disabled' : ''}>${r.text}</button>`;
                }).join('')}
              </div>
            ` : ''}

            ${(verdict === 'agree' || (verdict === 'disagree' && reasonIdx != null)) && !chalSubmitted ? `
              <div style="margin-top:12px">
                <button class="sdr-submit-btn" id="evalChallengeSubmitBtn">Submit My Judgment</button>
              </div>
            ` : ''}

            <div class="eval-challenge-feedback ${chalSubmitted ? 'show' : ''} ${challengeFeedbackClass}" id="evalChallengeFeedback">
              ${challengeFeedbackHtml}
            </div>

            ${chalSubmitted ? `
              <div style="margin-top:12px">
                <button class="sdr-reset-btn" id="evalChallengeResetBtn">Try with different sliders</button>
              </div>
            ` : ''}
          </div>
        </div>
        ` : ''}
      `;
    }

    function renderActionVisual() {
      const decision = getActionDecision();
      const activeId = `${visualState.action.seriousness}-${visualState.action.certainty}`;
      const cells = [
        { id: 'low-low', label: 'Low + Low', title: 'Monitor and clarify', text: 'Watch closely, request info, avoid overreaction.' },
        { id: 'low-moderate', label: 'Low + Moderate', title: 'Targeted follow-up', text: 'Refine picture with focused review.' },
        { id: 'low-high', label: 'Low + High', title: 'Routine risk management', text: 'Well-characterised minor risk — label and monitor.' },
        { id: 'high-low', label: 'High + Low', title: 'Escalate attention', text: 'Urgency rises even with incomplete certainty.' },
        { id: 'high-moderate', label: 'High + Moderate', title: 'Active response', text: 'Stronger communication, label work, or risk minimization.' },
        { id: 'high-high', label: 'High + High', title: 'Urgent regulatory action', text: 'Confirmed serious risk — full response with possible restrictions.' }
      ];

      return `
        <div class="visual-shell">
          <div class="visual-head">
            <span class="pill pill-accent">Interactive Visual</span>
            <h4>Action Planner</h4>
            <p>Choose seriousness, certainty, and mechanism. The model suggests a proportionate next step.</p>
          </div>
          <div class="visual-body">
            <div class="interactive-card">
              <h4>Choose the situation</h4>
              <div class="controls-grid" id="actionControls">
                <label class="field">Seriousness<select data-action="seriousness">
                  <option value="low" ${visualState.action.seriousness==='low'?'selected':''}>Low</option>
                  <option value="high" ${visualState.action.seriousness==='high'?'selected':''}>High</option>
                </select></label>
                <label class="field">Evidence certainty<select data-action="certainty">
                  <option value="low" ${visualState.action.certainty==='low'?'selected':''}>Low</option>
                  <option value="moderate" ${visualState.action.certainty==='moderate'?'selected':''}>Moderate</option>
                  <option value="high" ${visualState.action.certainty==='high'?'selected':''}>High</option>
                </select></label>
                <label class="field">Mechanism of harm<select data-action="mechanism">
                  <option value="clinical" ${visualState.action.mechanism==='clinical'?'selected':''}>Clinical / pharmacologic</option>
                  <option value="error" ${visualState.action.mechanism==='error'?'selected':''}>Medication error / design</option>
                </select></label>
              </div>
              <div class="decision-map">
                ${cells.map(c => `<div class="decision-cell ${activeId===c.id?'active':''}"><h4>${c.title}</h4><p>${c.text}</p></div>`).join('')}
              </div>
            </div>
            <div class="interactive-card">
              <h4>Suggested next step</h4>
              <div class="score-box">
                <div class="stat-line"><span>Posture</span><strong style="color:var(--text)">${decision.title}</strong></div>
                <div class="stat-line"><span>Focus</span><strong style="color:var(--text)">${decision.mechanismFocus}</strong></div>
              </div>
              <div class="result-box" style="margin-top:10px">
                <p style="margin:0 0 6px"><strong>Why:</strong> ${decision.reason}</p>
                <p style="margin:0"><strong>Track:</strong> ${decision.track}</p>
              </div>
              <div class="metric-grid">
                ${decision.examples.map(ex => `<div class="metric-card"><h4>${ex.title}</h4><p>${ex.text}</p></div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getActionDecision() {
      const { seriousness, certainty, mechanism } = visualState.action;
      const isError = mechanism === 'error';
      if (seriousness === 'high' && certainty === 'high') {
        return {
          title: isError ? 'Urgent design intervention with regulatory coordination' : 'Urgent safety restriction or regulatory referral',
          mechanismFocus: isError ? 'Immediate design fix, possible batch recall, and mandatory reporting' : 'Confirmed serious risk — restrict, communicate, and monitor intensively',
          reason: isError ? 'A well-established, serious use-error problem demands immediate corrective action: packaging/device redesign, possible product recall of affected batches, and regulatory notification.' : 'A confirmed serious risk with strong evidence may warrant urgent safety restrictions (e.g., restricted prescribing, contraindication in vulnerable subgroups), Article 20 referral, DHPC, and RMP update with additional risk minimisation measures.',
          track: isError ? 'Monitor whether the corrective action eliminates the error pattern. Track complaints, error reports, and patient outcomes post-redesign.' : 'Monitor whether the restriction reduces serious outcomes. Track compliance with new prescribing conditions and reassess benefit-risk periodically.',
          examples: [
            { title: 'Possible response', text: isError ? 'Batch recall, mandatory redesign, healthcare professional alert, post-correction surveillance' : 'Contraindication update, restricted access programme, Article 20 referral, mandatory PASS' },
            { title: 'What not to do', text: 'Delay action because the product is commercially important. High certainty + high seriousness demands action regardless of commercial considerations.' }
          ]
        };
      }
      if (seriousness === 'low' && certainty === 'high') {
        return {
          title: isError ? 'Routine design improvement' : 'Routine labeling and risk communication',
          mechanismFocus: isError ? 'Fix the design systematically as part of product lifecycle' : 'Well-characterised minor risk — ensure it is adequately communicated',
          reason: isError ? 'The error mechanism is well-understood and the impact is manageable. A systematic design improvement, updated instructions, and routine monitoring are proportionate.' : 'The risk is confirmed but not serious. Appropriate labeling (SmPC §4.8), patient information leaflet update, and routine pharmacovigilance are proportionate. No urgent action is required.',
          track: isError ? 'Monitor whether the design improvement reduces error frequency over time.' : 'Track as part of routine signal monitoring and include in next PBRER.',
          examples: [
            { title: 'Possible response', text: isError ? 'Improved instructions, minor design adjustment, routine monitoring' : 'SmPC/PIL update, routine monitoring, inclusion in PBRER' },
            { title: 'What not to do', text: 'Over-escalate a well-understood minor issue. Proportionality means matching action to both seriousness and certainty.' }
          ]
        };
      }
      if (seriousness === 'high' && certainty === 'moderate') {
        return {
          title: isError ? 'Active design-focused intervention' : 'Active safety response',
          mechanismFocus: isError ? 'Fix the use pathway' : 'Protect against a clinically meaningful risk',
          reason: isError ? 'Severe enough that design change, communication, and controls may protect patients fastest.' : 'Serious and credible — communication, label work, or risk minimization may be justified.',
          track: isError ? 'Monitor repeat error reports and confusion patterns.' : 'Monitor event frequency, severity, and subgroup pattern.',
          examples: [
            { title: 'Possible response', text: isError ? 'Packaging redesign, workflow warning, training' : 'Communication, labeling update, enhanced monitoring' },
            { title: 'What not to do', text: 'Assume the job ends once the action is announced.' }
          ]
        };
      }
      if (seriousness === 'high' && certainty === 'low') {
        return {
          title: 'Escalated but careful review',
          mechanismFocus: isError ? 'Clarify operational cause quickly' : 'Clarify clinical signal quickly',
          reason: 'Potential harm is serious — may need urgent review even if certainty is incomplete.',
          track: 'Watch for additional cases, improved quality, or rapid emergence.',
          examples: [
            { title: 'Possible response', text: 'Targeted follow-up, urgent internal review, close surveillance' },
            { title: 'What not to do', text: 'Ignore a severe issue because certainty is not perfect.' }
          ]
        };
      }
      if (seriousness === 'low' && certainty === 'moderate') {
        return {
          title: 'Focused refinement',
          mechanismFocus: 'Improve understanding before escalating',
          reason: 'Some credibility, but lower harm — targeted clarification may be enough.',
          track: 'Track whether pattern grows, becomes more serious, or spreads.',
          examples: [
            { title: 'Possible response', text: 'Focused case review, extra analysis, targeted follow-up' },
            { title: 'What not to do', text: 'Make a dramatic response if practical benefit is low.' }
          ]
        };
      }
      return {
        title: 'Monitor and clarify',
        mechanismFocus: 'Keep learning without overreacting',
        reason: 'Low seriousness with low certainty — continued monitoring and better data needed.',
        track: 'Track whether reports become more numerous, serious, or coherent.',
        examples: [
          { title: 'Possible response', text: 'Routine monitoring, case cleanup, coding review' },
          { title: 'What not to do', text: 'Confuse "not ready to act strongly" with "ignore it."' }
        ]
      };
    }

    function renderScenarioVisual() {
      const item = scenarioExplorer[visualState.scenario];
      const stepMap = { detect: item.detect, evaluate: item.evaluate, action: item.action };
      const stepTitleMap = { detect: 'How to detect it', evaluate: 'How to evaluate it', action: 'How to act on it' };

      return `
        <div class="visual-shell">
          <div class="visual-head">
            <span class="pill pill-accent">Interactive Visual</span>
            <h4>Scenario Workbench</h4>
            <p>Select a scenario, then move through detect → evaluate → action.</p>
          </div>
          <div class="scenario-layout">
            <div class="interactive-card">
              <h4>Choose a scenario</h4>
              <div class="tool-row-pills" id="scenarioSelector">
                ${Object.entries(scenarioExplorer).map(([k, v]) =>
                  `<button class="tool-pill-btn ${visualState.scenario===k?'active':''}" data-scenario="${k}">${v.title.split(' ').slice(0,3).join(' ')}</button>`
                ).join('')}
              </div>
              <div class="result-box" style="margin-top:12px">
                <p style="margin:0"><strong>${item.title}</strong><br>${item.summary}</p>
              </div>
              <div class="scenario-step-row" id="scenarioStepSelector" style="margin-top:12px">
                <button class="scenario-step-btn ${visualState.scenarioStep==='detect'?'active':''}" data-step="detect">Detect</button>
                <button class="scenario-step-btn ${visualState.scenarioStep==='evaluate'?'active':''}" data-step="evaluate">Evaluate</button>
                <button class="scenario-step-btn ${visualState.scenarioStep==='action'?'active':''}" data-step="action">Act</button>
              </div>
            </div>
            <div class="scenario-detail">
              <span class="pill pill-accent">${stepTitleMap[visualState.scenarioStep]}</span>
              <h4 style="margin-top:10px">${item.title}</h4>
              <p>${stepMap[visualState.scenarioStep]}</p>
              <div class="metric-grid">
                <div class="metric-card"><h4>Useful methods</h4><ul>${(item.stepMethods[visualState.scenarioStep] || []).map(m=>`<li>${m}</li>`).join('')}</ul></div>
                <div class="metric-card"><h4>Likely tools</h4><ul>${(item.stepTools[visualState.scenarioStep] || []).map(t=>`<li>${t}</li>`).join('')}</ul></div>
              </div>
              <div class="result-box" style="margin-top:10px"><p style="margin:0"><strong>Key point:</strong> ${item.stepKeyPoints[visualState.scenarioStep] || 'The best method depends on the nature of the problem.'}</p></div>
            </div>
          </div>
        </div>
      `;
    }

    // ── Visual bindings ──
    function bindStageVisuals(stageId) {
      if (stageId === 'fundamentals') {
        document.querySelectorAll('#fundamentalsLadder .ladder-step').forEach(s => {
          s.addEventListener('click', () => { visualState.fundamentalsStep = Number(s.dataset.step); renderStageContent(); });
        });
      }
      if (stageId === 'detection') {
        document.querySelectorAll('#detectionMethodChips .chip-btn').forEach(b => {
          b.addEventListener('click', () => { visualState.detectionMethod = b.dataset.method; renderStageContent(); });
        });
        // SDR triage interactions
        document.querySelectorAll('[data-sdr-pick]').forEach(btn => {
          if (visualState.sdrSubmitted) return;
          btn.addEventListener('click', () => {
            const idx = Number(btn.dataset.sdrPick);
            const pos = visualState.sdrPicks.indexOf(idx);
            if (pos >= 0) {
              visualState.sdrPicks.splice(pos, 1);
            } else if (visualState.sdrPicks.length < 3) {
              visualState.sdrPicks.push(idx);
            }
            renderStageContent();
          });
        });
        const sdrSubmit = document.getElementById('sdrSubmitBtn');
        if (sdrSubmit) sdrSubmit.addEventListener('click', () => {
          if (visualState.sdrPicks.length === 3 && !visualState.sdrSubmitted) {
            visualState.sdrSubmitted = true;
            renderStageContent();
          }
        });
        const sdrReset = document.getElementById('sdrResetBtn');
        if (sdrReset) sdrReset.addEventListener('click', () => {
          visualState.sdrPicks = [];
          visualState.sdrSubmitted = false;
          renderStageContent();
        });
      }
      if (stageId === 'evaluation') {
        document.querySelectorAll('#evaluationControls input[data-eval]').forEach(inp => {
          inp.addEventListener('input', () => {
            visualState.evaluation[inp.dataset.eval] = Number(inp.value);
            // Reset challenge when sliders change
            visualState.evalChallengeVerdict = null;
            visualState.evalChallengeReason = null;
            visualState.evalChallengeSubmitted = false;
            // Direct DOM update for smoother slider experience
            const e = visualState.evaluation;
            const score = (e.chronology*0.2)+(e.dechallenge*0.18)+(e.plausibility*0.14)+(e.confounding*0.16)+(e.consistency*0.14)+(e.seriousness*0.18);
            const strength = score>=65?'Credible — warrants action planning':score>=40?'Possible — needs more data':'Weak — monitor and gather';
            const summary = score>=65?'Evidence from multiple dimensions suggests a real issue.':score>=40?'Some supporting evidence, but gaps remain.':'Too uncertain for confident conclusions.';
            const el = (id) => document.getElementById(id);
            if(el('evaluationScore')) el('evaluationScore').textContent = `${score.toFixed(0)} / 100`;
            if(el('evaluationStrength')) el('evaluationStrength').textContent = strength;
            if(el('evaluationThumb')) el('evaluationThumb').style.left = `${Math.min(100,Math.max(0,score))}%`;
            if(el('evaluationSummary')) el('evaluationSummary').innerHTML = `<p style="margin:0"><strong>Interpretation:</strong> ${summary}</p>`;
            Object.entries(e).forEach(([k,v]) => {
              if(el(`evalValue-${k}`)) el(`evalValue-${k}`).textContent = v;
              if(el(`evaluationBar-${k}`)) el(`evaluationBar-${k}`).style.width = `${v}%`;
              if(el(`evaluationBarValue-${k}`)) el(`evaluationBarValue-${k}`).textContent = v;
            });
            // Re-render the challenge section without full re-render (to avoid slider jank)
            // We need a full re-render for the challenge panel to update
            clearTimeout(window._evalDebounce);
            window._evalDebounce = setTimeout(() => renderStageContent(), 300);
          });
        });
        // Challenge interactions
        document.querySelectorAll('#evalVerdictRow .eval-verdict-btn').forEach(btn => {
          if (visualState.evalChallengeSubmitted) return;
          btn.addEventListener('click', () => {
            visualState.evalChallengeVerdict = btn.dataset.verdict;
            visualState.evalChallengeReason = null;
            visualState.evalChallengeSubmitted = false;
            renderStageContent();
          });
        });
        document.querySelectorAll('#evalReasonGrid .eval-reason-btn').forEach(btn => {
          if (visualState.evalChallengeSubmitted) return;
          btn.addEventListener('click', () => {
            visualState.evalChallengeReason = Number(btn.dataset.reason);
            renderStageContent();
          });
        });
        const chalSubmit = document.getElementById('evalChallengeSubmitBtn');
        if (chalSubmit) chalSubmit.addEventListener('click', () => {
          visualState.evalChallengeSubmitted = true;
          renderStageContent();
        });
        const chalReset = document.getElementById('evalChallengeResetBtn');
        if (chalReset) chalReset.addEventListener('click', () => {
          visualState.evalChallengeVerdict = null;
          visualState.evalChallengeReason = null;
          visualState.evalChallengeSubmitted = false;
          renderStageContent();
        });
      }
      if (stageId === 'action') {
        document.querySelectorAll('#actionControls select[data-action]').forEach(sel => {
          sel.addEventListener('change', () => { visualState.action[sel.dataset.action] = sel.value; renderStageContent(); });
        });
      }
      if (stageId === 'scenarios') {
        document.querySelectorAll('#scenarioSelector .tool-pill-btn').forEach(b => {
          b.addEventListener('click', () => { visualState.scenario = b.dataset.scenario; renderStageContent(); });
        });
        document.querySelectorAll('#scenarioStepSelector .scenario-step-btn').forEach(b => {
          b.addEventListener('click', () => { visualState.scenarioStep = b.dataset.step; renderStageContent(); });
        });
      }
    }

    // ═══════════════════════════════════════════
    // BOOTSTRAP
    // ═══════════════════════════════════════════
    function renderAll() {
      if (!isUnlocked(activeStageIndex)) activeStageIndex = progress.unlocked;
      renderModuleNav();
      renderSidebar();
      renderContent();
      updateNavProgress();
    }

    document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
    renderAll();
  </script>
</body>
</html>
